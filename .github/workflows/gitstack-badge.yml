name: GitStack Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./actions/readme-badge
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitstack-url: https://gitstack.pro
