name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017/gitstack_test
          GEMINI_API_KEY: test-key
          CLERK_JWKS_URL: https://test.clerk.accounts.dev/.well-known/jwks.json
          RAZORPAY_KEY_ID: rzp_test_xxx
          RAZORPAY_KEY_SECRET: test_secret
          REDIS_URL: ""

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          REACT_APP_CLERK_PUBLISHABLE_KEY: pk_test_xxx
          CI: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: gitstack-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  load-test-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'perf')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust

      - name: Start backend (background)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          uvicorn server:app --host 127.0.0.1 --port 8001 &
          sleep 5
        env:
          MONGO_URL: mongodb://localhost:27017/gitstack_test
          GEMINI_API_KEY: test-key
          CLERK_JWKS_URL: https://test.clerk.accounts.dev/.well-known/jwks.json

      - name: Run Locust smoke test
        run: |
          locust -f backend/tests/load/locustfile.py --host http://127.0.0.1:8001 -u 10 -r 2 -t 60s --headless
