# Render Blueprint — One-click deploy for GitStack Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gitstack-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/gitstack
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false  # Set in Render Dashboard after deploy
      - key: DB_NAME
        value: gitstack
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false  # Your Vercel frontend URL
      - key: REDIS_URL
        sync: false  # Upstash or Redis Cloud URL
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: gitstack-marketplace
      - key: R2_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: hello@gitstack.pro
      - key: SMTP_FROM_NAME
        value: GitStack
      - key: EMAIL_TOKEN_SECRET
        generateValue: true  # Auto-generated secret
      - key: FRONTEND_URL
        sync: false  # Your Vercel frontend URL
      - key: ADMIN_EMAILS
        sync: false
      - key: CACHE_TTL_SOLUTIONS
        value: 600
      - key: SCRAPER_CONCURRENCY
        value: 25
    healthCheckPath: /health
    autoDeploy: true
