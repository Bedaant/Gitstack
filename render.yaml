services:
  # ── Backend (FastAPI) ──────────────────────────────────────────
  - type: web
    name: gitstack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false          # fill in Render dashboard
      - key: DB_NAME
        value: gitstack
      - key: GEMINI_API_KEY
        sync: false          # fill in Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # optional but strongly recommended — raises rate limit to 5000/hr
      - key: CORS_ORIGINS
        sync: false          # set to your frontend URL, e.g. https://gitstack-app.onrender.com
      - key: NTFY_TOPIC
        value: gitstack-alerts
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend (React static site) ──────────────────────────────
  - type: web
    name: gitstack-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # set to your backend URL after it deploys, e.g. https://gitstack-api.onrender.com
