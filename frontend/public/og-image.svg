<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAF9"/>

  <!-- Top border accent -->
  <rect width="1200" height="8" fill="#000000"/>

  <!-- Left black panel -->
  <rect x="0" y="8" width="520" height="622" fill="#0A0A0A"/>

  <!-- Neo-brutalist shadow block -->
  <rect x="60" y="80" width="380" height="200" fill="#EF4444" transform="translate(8,8)"/>
  <rect x="60" y="80" width="380" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>

  <!-- G logo mark -->
  <circle cx="130" cy="140" r="40" fill="#2563EB"/>
  <text x="130" y="150" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="white" text-anchor="middle">G</text>

  <!-- GitStack wordmark -->
  <text x="185" y="133" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#0A0A0A" letter-spacing="-1">Git</text>
  <text x="225" y="133" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#2563EB" letter-spacing="-1">Stack</text>
  <text x="185" y="157" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#52525B" letter-spacing="2">FREE TOOLS FOR FOUNDERS</text>

  <!-- Headline -->
  <text x="60" y="330" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="#FFFFFF" letter-spacing="-2">Stop paying for</text>
  <text x="60" y="382" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="#EF4444" letter-spacing="-2">tools you don't need.</text>

  <!-- Subtext -->
  <text x="60" y="435" font-family="Arial, sans-serif" font-size="20" fill="#A1A1AA">Free open-source alternatives for</text>
  <text x="60" y="460" font-family="Arial, sans-serif" font-size="20" fill="#A1A1AA">every SaaS tool you're overpaying for.</text>

  <!-- Live badge -->
  <rect x="60" y="500" width="160" height="36" fill="none" stroke="#22C55E" stroke-width="2"/>
  <circle cx="84" cy="518" r="6" fill="#22C55E"/>
  <text x="98" y="523" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#22C55E" letter-spacing="1">LIVE · FREE</text>

  <!-- Right panel — feature cards -->
  <!-- Card 1: Stack Generator -->
  <rect x="560" y="60" width="280" height="140" fill="#FAFAF9" stroke="#000000" stroke-width="3" transform="translate(5,5)"/>
  <rect x="560" y="60" width="280" height="140" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <rect x="560" y="60" width="280" height="36" fill="#2563EB"/>
  <text x="576" y="83" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white" letter-spacing="0.5">✦ STACK GENERATOR</text>
  <text x="576" y="120" font-family="Arial, sans-serif" font-size="13" fill="#3F3F46">"Build a SaaS invoice tool"</text>
  <text x="576" y="140" font-family="Arial Black, Arial" font-weight="700" font-size="12" fill="#2563EB">→ Supabase · n8n · Resend · Plausible</text>
  <text x="576" y="182" font-family="Arial, sans-serif" font-size="11" fill="#71717A">Free alternatives. No credit card.</text>

  <!-- Card 2: Roast My Stack -->
  <rect x="860" y="60" width="280" height="140" fill="#0A0A0A" stroke="#EF4444" stroke-width="3" transform="translate(5,5)"/>
  <rect x="860" y="60" width="280" height="140" fill="#0A0A0A" stroke="#EF4444" stroke-width="3"/>
  <rect x="860" y="60" width="280" height="36" fill="#EF4444"/>
  <text x="876" y="83" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white" letter-spacing="0.5">🔥 ROAST MY STACK</text>
  <text x="876" y="120" font-family="Arial, sans-serif" font-size="12" fill="#D4D4D8">Zapier: $600/yr tax on reading</text>
  <text x="876" y="138" font-family="Arial, sans-serif" font-size="12" fill="#D4D4D8">a README. Use n8n instead.</text>
  <text x="876" y="180" font-family="Arial Black, Arial" font-weight="700" font-size="12" fill="#22C55E">Save $1,380/year →</text>

  <!-- Card 3: Dead Tool Detector -->
  <rect x="560" y="230" width="280" height="130" fill="#FAFAF9" stroke="#000000" stroke-width="3" transform="translate(5,5)"/>
  <rect x="560" y="230" width="280" height="130" fill="#ECFDF5" stroke="#000000" stroke-width="3"/>
  <rect x="560" y="230" width="280" height="36" fill="#000000"/>
  <text x="576" y="253" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white" letter-spacing="0.5">💀 DEAD TOOL DETECTOR</text>
  <text x="576" y="295" font-family="Arial Black, Arial" font-weight="900" font-size="38" fill="#0A0A0A">$1,752</text>
  <text x="576" y="318" font-family="Arial, sans-serif" font-size="12" fill="#52525B">saved per year · forever free</text>
  <text x="576" y="342" font-family="Arial, sans-serif" font-size="11" fill="#71717A">Zapier · Mailchimp · Typeform → free</text>

  <!-- Card 4: Repo Translator -->
  <rect x="860" y="230" width="280" height="130" fill="#FAFAF9" stroke="#000000" stroke-width="3" transform="translate(5,5)"/>
  <rect x="860" y="230" width="280" height="130" fill="#EFF6FF" stroke="#000000" stroke-width="3"/>
  <rect x="860" y="230" width="280" height="36" fill="#000000"/>
  <text x="876" y="253" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white" letter-spacing="0.5">📖 REPO TRANSLATOR</text>
  <text x="876" y="295" font-family="Arial, sans-serif" font-size="13" fill="#1E40AF">"Any GitHub URL →</text>
  <text x="876" y="313" font-family="Arial, sans-serif" font-size="13" fill="#1E40AF"> plain English in 10 sec"</text>
  <text x="876" y="342" font-family="Arial, sans-serif" font-size="11" fill="#71717A">No code needed. Instant.</text>

  <!-- Stats bar -->
  <rect x="560" y="400" width="580" height="80" fill="#000000"/>
  <text x="620" y="432" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#FFFFFF">847+</text>
  <text x="620" y="452" font-family="Arial, sans-serif" font-size="11" fill="#A1A1AA">STACKS BUILT</text>
  <line x1="730" y1="415" x2="730" y2="465" stroke="#3F3F46" stroke-width="1"/>
  <text x="760" y="432" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#22C55E">$124k+</text>
  <text x="760" y="452" font-family="Arial, sans-serif" font-size="11" fill="#A1A1AA">SAVED BY FOUNDERS</text>
  <line x1="920" y1="415" x2="920" y2="465" stroke="#3F3F46" stroke-width="1"/>
  <text x="950" y="432" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#FFFFFF">1.2k+</text>
  <text x="950" y="452" font-family="Arial, sans-serif" font-size="11" fill="#A1A1AA">FOUNDERS USING IT</text>

  <!-- URL -->
  <text x="560" y="560" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#A1A1AA" letter-spacing="1">gitstack.dev</text>

  <!-- Bottom border -->
  <rect x="0" y="622" width="1200" height="8" fill="#000000"/>
</svg>
